[package]
name = "smudgy"
version = "0.1.0"
authors = ["walt"]
edition = "2021"
build = "build.rs"

[dependencies]
anyhow = "1.0.86"
deno_core = { version = "0.289.0", features = ["unsafe_use_unprotected_platform"] }
fontdue = { version = "0.9.2", features = ["std"] }
i-slint-backend-winit = { path = "./vendor/slint/internal/backends/winit" }
i-slint-core = { path = "./vendor/slint/internal/core" }
lru = { version = "0.12.3", features = ["nightly"] }
raw-window-handle = "0.6.2"
regex = { version = "1.10.5", features = ["pattern", "unstable"] }
slint =  { path = "./vendor/slint/api/rs/slint", default-features = false, features = ["compat-1-2", "std", "gettext", "accessibility", "backend-winit", "renderer-skia-opengl" ]  }
tiny-skia = "0.11.4"
tokio = { version = "1.38.0", features = ["full"] }
vtparse = "0.6.2"
smudgy_connect_window = {path = "./ui_src/connect_window"}
dirs = "5.0.1"

[build-dependencies]
slint-build = { path = "./vendor/slint/api/rs/build" }
winresource = "0.1.17"

[profile.profiling]
inherits = "release"
debug = true

[lints.clippy]
pedantic = "warn"
